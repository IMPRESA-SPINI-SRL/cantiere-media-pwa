<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#343c42">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self'; navigate-to 'self'; base-uri 'none'; form-action 'none'">
  <title>Ripristino aggiornamento - Cantiere Media</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #171a1c; background: #f5f4f1; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
    main { width: min(100%, 480px); padding: 28px; border-radius: 18px; background: white; box-shadow: 0 14px 40px rgba(22,45,38,.16); text-align: center; }
    .mark { width: min(230px, 72vw); margin: 0 auto 18px; padding: 10px 14px; border-radius: 14px; background: white; box-shadow: 0 5px 18px rgba(20,38,77,.14); }
    .mark img { display: block; width: 100%; height: auto; }
    h1 { margin: 0 0 12px; font-size: 1.35rem; }
    p { margin: 8px 0; line-height: 1.5; color: #667085; }
    .spinner { width: 34px; height: 34px; margin: 22px auto 8px; border: 4px solid #d7ddea; border-top-color: #c92832; border-radius: 50%; animation: spin .75s linear infinite; }
    .ok { color: #1f6c4a; font-weight: 700; }
    .error { color: #9a2e27; font-weight: 700; }
    button { min-height: 46px; margin-top: 18px; border: 0; border-radius: 12px; padding: 10px 18px; background: #c92832; color: white; font: inherit; font-weight: 750; cursor: pointer; }
    [hidden] { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="mark"><img src="./images/logo-spini.png" alt="Impresa Spini"></div>
    <h1>Ripristino aggiornamento</h1>
    <p id="status">Rimuovo soltanto la vecchia cache dell'app. Cantieri, utenti, foto e video non vengono cancellati.</p>
    <div id="spinner" class="spinner" aria-hidden="true"></div>
    <button id="retry" type="button" hidden>Riprova</button>
  </main>
  <script>
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const retry = document.getElementById('retry');

    async function repair() {
      spinner.hidden = false;
      retry.hidden = true;
      status.className = '';
      status.textContent = "Rimuovo soltanto la vecchia cache dell'app. Cantieri, utenti, foto e video non vengono cancellati.";

      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(
            names
              .filter((name) => name.startsWith('cantiere-media-shell-'))
              .map((name) => caches.delete(name)),
          );
        }

        status.className = 'ok';
        status.textContent = 'Cache aggiornata. Riapro Cantiere Media 1.5.0...';
        setTimeout(() => {
          location.replace(`./?cache-repaired=${Date.now()}`);
        }, 700);
      } catch (error) {
        console.error(error);
        spinner.hidden = true;
        retry.hidden = false;
        status.className = 'error';
        status.textContent = 'Ripristino non completato. Premi Riprova.';
      }
    }

    retry.addEventListener('click', repair);
    repair();
  </script>
</body>
</html>
